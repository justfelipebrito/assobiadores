name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, type-check, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-batalha
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:ci
      NEXT_PUBLIC_USE_FIREBASE_EMULATORS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run automated tests
        run: pnpm test

      - name: Type-check
        run: pnpm type-check

      - name: Build
        run: pnpm build
